    <!-- INICIO SCRIPT -->
    <script>
        // Listas auxiliares para construção dinâmica da interface
        const listaLib = ["Lote financeiro", "Nomeação", "Exoneração", "Reenquadramento", "Ganhos individuais", "Lotes de ganhos individuais", "Nomeação no mesmo órgão", "Alteração de dados funcionais", "Alteração de dados cadastrais", "Alteração de situação funcional", "Disposição", "Alteração de cargo e nível de GATA"];
        const listaCheck = [
            { name: "ALTERAÇÃO DE DADOS CADASTRAIS", status: ["Aguardando Distribuição", "Aguardando Homologação", "Retorno"] },
            { name: "ALTERAÇÃO DE DADOS FUNCIONAIS", status: ["Aguardando Distribuição", "Aguardando Homologação", "Retorno"] },
            { name: "ALTERAÇÃO DE CARGO E GATA DE COMISSIONADO", status: ["Aguardando Análise", "Aguardando Analista Superior", "Aguardando Distribuição", "Aguardando Homologação", "Retorno RD", "Retorno RH"] },
            { name: "REENQUADRAMENTO", status: ["Aguardando Análise", "Aguardando Analista Superior", "Aguardando Distribuição", "Aguardando Homologação", "Retorno RD", "Retorno RH"] },
            { name: "LOTE FINANCEIRO", status: ["Em Análise", "Aguardando Distribuição", "Aguardando Analista Superior", "Retorno"] },
            { name: "LOTE DE GANHOS INDIVIDUAIS PARA SERVIDOR", status: ["Aguardando Análise", "Aguardando Analista Superior", "Aguardando Distribuição", "Retorno"] },
            { name: "GANHOS INDIVIDUAIS PARA SERVIDOR", status: ["Aguardando Análise", "Aguardando Analista Superior", "Aguardando Distribuição", "Retorno"] },
            { name: "EXONERAÇÃO", status: ["Homologado", "Aguardando Analista Superior"] },
            { name: "NOMEAÇÃO", status: ["Aguardando Homologação", "Aguardando Analista Superior", "Aguardando Análise", "Aguardando Distribuição", "Retorno RH", "Retorno RD"] },
            { name: "NOMEAÇÃO CARGO COMISSIONADO NO MESMO ÓRGÃO", status: ["Aguardando Análise", "Aguardando Analista Superior", "Aguardando Distribuição", "Retorno"] },
            { name: "DISPOSIÇÃO", status: ["Aguardando Homologação", "Aguardando Analista Superior", "Aguardando Análise", "Aguardando Distribuição", "Retorno RH", "Retorno RD"] },
            { name: "COMPLEMENTAÇÃO DE CARGA HORARIA", status: ["Aguardando Análise", "Aguardando Analista Superior", "Aguardando Distribuição", "Aguardando Homologação", "Retorno RD", "Retorno RH"] },
            { name: "ALTERAÇÃO DE SITUAÇÃO FUNCIONAL", status: ["Aguardando Análise", "Aguardando Analista Superior", "Aguardando Distribuição", "Aguardando Homologação", "Retorno"] }
        ];

        // --- FUNÇÕES DE INTERFACE ---
        // Alterna entre as "telas" do sistema
        function showView(id) {
            document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            window.scrollTo(0,0);
        }

        // Copia texto de um elemento de input/textarea para a área de transferência
        function copyToClipboard(areaId, msgId) {
            const area = document.getElementById(areaId);
            if(!area.value) return;
            navigator.clipboard.writeText(area.value).then(() => {
                const msg = document.getElementById(msgId);
                msg.classList.remove('opacity-0');
                setTimeout(() => msg.classList.add('opacity-0'), 2000);
            });
        }

        // Copia um texto arbitrário e fornece feedback visual no botão clicado
        function copyRawTextFeedback(text, btnId) {
            navigator.clipboard.writeText(text).then(() => {
                const btn = document.getElementById(btnId);
                const originalText = btn.innerText;
                btn.innerText = "Copiado!";
                btn.classList.add('bg-green-600');
                btn.classList.remove('bg-purple-600');
                setTimeout(() => {
                    btn.innerText = originalText;
                    btn.classList.remove('bg-green-600');
                    btn.classList.add('bg-purple-600');
                }, 2000);
            });
        }


        // Função Debounce para evitar sobrecarga
        function debounce(func, timeout = 300) {
            let timer;
            return (...args) => {
                clearTimeout(timer);
                timer = setTimeout(() => { func.apply(this, args); }, timeout);
            };
        }


        const database_config_busca = {
            "resultadoConsulta": {
                "database": typeof dbOrgaos !== 'undefined' ? dbOrgaos : [],
                "colunas": ["sigla", "orgao", "codigo", "grupo", "tipo"],
                "render": renderizarOrgaos
            },
            "resultadoVinculo": {
                "database": typeof dbVinculos !== 'undefined' ? dbVinculos : [],
                "colunas": ["id", "titulo", "regime", "descricao", "detalhe"],
                "render": renderizarVinculos
            },
            "resultadoSituacao": {
                "database": typeof dbSituacoes !== 'undefined' ? dbSituacoes : [],
                "colunas": ["cod", "desc", "detalhe"],
                "render": renderizarSituacoes
            }
        };


        // --- NOVA FUNÇÃO DE BUSCA UNIFICADA ---
        function realizarBuscaUniversal(inputId, containerId) {
                    const termo = removerAcentos(document.getElementById(inputId).value.toLowerCase().trim());
                    const container = document.getElementById(containerId);
                    const config = database_config_busca[containerId];

                    if (termo.length < 1) return container.innerHTML = '';

                    const filtrados = config.database.filter(item => {
                        // Percorre apenas as colunas definidas no database_config_busca
                        return config.colunas.some(coluna => {
                            const valorCampo = removerAcentos(String(item[coluna] || "").toLowerCase());
                            return valorCampo.includes(termo);
                        });
                    });

                    config.render(filtrados);
                }

        
        const removerAcentos = (texto) => texto.normalize('NFD').replace(/[\u0300-\u036f]/g, "");


        // Gatilhos debounced apontando para a função universal
        const buscarOrgaoDebounced = debounce(() => realizarBuscaUniversal('inputBuscaOrgao', 'resultadoConsulta'), 300);
        const buscarVinculoDebounced = debounce(() => realizarBuscaUniversal('inputBuscaVinculo', 'resultadoVinculo'), 300);
        const buscarSituacaoDebounced = debounce(() => realizarBuscaUniversal('inputBuscaSituacao', 'resultadoSituacao'), 300);


        // --- RENDERIZADORES DE RESULTADOS ---
        // --- RESULTADOS ÓRGÃO ---
        function renderizarOrgaos(filtrados) {
                    document.getElementById('resultadoConsulta').innerHTML = filtrados.map((i, idx) => `
                        <div class="bg-white border border-gray-200 rounded-xl overflow-hidden shadow-sm p-6">
                            <h3 class="text-xl font-bold text-gray-800 mb-4"><span class="uppercase">${i.sigla}</span> - ${i.orgao}</h3>
                            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 text-sm mb-4 bg-gray-50 p-3 rounded-lg border border-gray-100">
                                <div><p class="text-[12px] uppercase font-bold text-gray-400">Código</p><p class="text-base font-semibold text-gray-700">${i.codigo}</p></div>
                                <div><p class="text-[12px] uppercase font-bold text-gray-400">Grupo</p><p class="text-base font-semibold text-gray-700">${i.grupo}</p></div>
                                <div><p class="text-[12px] uppercase font-bold text-gray-400">Tipo</p><p class="text-base font-semibold text-gray-700">${i.tipo}</p></div>
                            </div>
                            <div class="flex flex-col sm:flex-row gap-2">
                                <button id="btnCopOrg-${idx}" onclick="copyRawTextFeedback('${i.link}', 'btnCopOrg-${idx}')" class="flex-1 bg-purple-600 text-white py-2 rounded-lg text-sm font-bold transition-all hover:bg-purple-700">Copiar Link</button>
                                <a href="${i.link}" target="_blank" class="flex-1 bg-gray-100 text-gray-700 text-center py-2 rounded-lg text-sm font-bold hover:bg-gray-200">Abrir Pasta</a>
                            </div>
                        </div>`).join('');
        }

        // --- RESULTADOS VINCULO ---
        function renderizarVinculos(filtrados) {
                    document.getElementById('resultadoVinculo').innerHTML = filtrados.map((i) => `
                        <div class="flex flex-col md:flex-row bg-white border border-gray-200 rounded-xl overflow-hidden shadow-sm">
                            <div class="bg-gray-50 border-r border-gray-200 p-5 flex flex-col justify-center items-center min-w-[140px]">
                                <span class="text-orange-600 font-black text-5xl uppercase">${i.id}</span>
                                <p class="text-[10px] uppercase font-bold text-gray-400 mt-2">Vínculo</p>
                            </div>
                            <div class="flex-1 p-5">
                                <h3 class="text-xl font-bold text-gray-800 mb-2">${i.titulo}</h3>
                                <div class="grid grid-cols-2 gap-4 text-sm mb-4">
                                    <div><p class="text-[10px] uppercase font-bold text-gray-400">Regime</p><p class="font-semibold text-gray-700">${i.regime}</p></div>
                                    <div><p class="text-[10px] uppercase font-bold text-gray-400">Previdência</p><p class="font-semibold text-gray-700">${i.descricao}</p></div>
                                </div>
                                <div class="bg-orange-50 p-3 rounded-lg border border-orange-100"><p class="text-sm text-orange-900 font-medium">${i.detalhe}</p></div>
                            </div>
                        </div>`).join('');
        }


        // --- RESULTADOS SITUAÇÃO ---
        function renderizarSituacoes(filtrados) {
                    document.getElementById('resultadoSituacao').innerHTML = filtrados.map((i) => `
                        <div class="flex flex-col md:flex-row bg-white border border-gray-200 rounded-xl overflow-hidden shadow-sm">
                            <div class="bg-gray-50 border-r border-gray-200 p-5 flex flex-col justify-center items-center min-w-[140px]">
                                <span class="text-cyan-600 font-black text-4xl uppercase">${i.cod}</span>
                                <p class="text-[10px] uppercase font-bold text-gray-400 mt-2">Código</p>
                            </div>
                            <div class="flex-1 p-5">
                                <h3 class="text-xl font-bold text-gray-800 mb-2">${i.desc}</h3>
                                <div class="bg-cyan-50 p-3 rounded-lg border border-cyan-100 mt-4"><p class="text-sm text-cyan-900 font-medium">${i.detalhe}</p></div>
                            </div>
                        </div>`).join('');
        }


        // --- FUNÇÕES DE GERAÇÃO DE TEXTO ---
        // Gera a mensagem de liberação baseada na sigla, módulos selecionados e horário
        function generateLib() {
            const sigla = document.getElementById('orgaoSigla').value.toUpperCase().trim();
            const hora = document.getElementById('horaLiberacao').value;
            const sel = Array.from(document.querySelectorAll('input[name="mLib"]:checked')).map(c => `- ${c.value}`);
            if(!sigla) return alert("Informe a sigla.");
            let wa = `*${sigla}*\n${sel.join('\n')}\n\nSistema liberado${hora ? ' até as '+hora : '.'}`;
            document.getElementById('outLib').value = wa;
            document.getElementById('outChamado').value = hora ? `Sistema liberado até as ${hora}.` : "Sistema liberado.";
        }

        // Gera o texto formatado do checklist apenas com os itens que possuem valor > 0
        function generateCheck() {
            const inputs = document.querySelectorAll('#checklistGrid input');
            let res = ""; let mod = "";
            inputs.forEach(i => {
                if(parseInt(i.value) > 0) {
                    if(mod !== i.dataset.mod) { mod = i.dataset.mod; res += (res ? "\n" : "") + `*${mod}*\n`; }
                    res += `${i.dataset.stat} – ${i.value}\n`;
                }
            });
            document.getElementById('outCheck').value = res.trim();
        }

        // RESRTA OS CAMPOS DA TELA DE LIBERAÇÃO
        function clearLib() { 
            // Limpa a sigla
            document.getElementById('orgaoSigla').value = ""; 

            // VERIFICAÇÃO DO CHECKBOX: Só apaga se NÃO estiver marcado
            const salvarHora = document.getElementById('checkSalvarHora').checked;
            if (!salvarHora) {
                document.getElementById('horaLiberacao').value = "";
            }

            // Desmarca os módulos
            document.querySelectorAll('input[name="mLib"]').forEach(c => c.checked = false);

            // Limpa as saídas
            document.getElementById('outLib').value = ""; 
            document.getElementById('outChamado').value = "";
        }

            function renderLinks() {
            const container = document.getElementById('containerLinks');
            // Ele lê a variável 'dbLinks' que vem do arquivo externo
            container.innerHTML = dbLinks.map(link => `
                <a href="${link.url}" target="_blank" class="flex items-center justify-between p-4 border border-gray-200 rounded-xl hover:bg-pink-50 hover:border-pink-300 transition-all group">
                    <span class="font-bold text-gray-700 group-hover:text-pink-700">${link.nome}</span>
                    <svg class="w-5 h-5 text-gray-400 group-hover:text-pink-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg>
                </a>
            `).join('');
        }
    
        // Reseta todos os contadores da tela de Checklist
        function clearCheck() { 
            document.querySelectorAll('#checklistGrid input').forEach(i => i.value = 0);
            document.getElementById('outCheck').value = "";
        }

        // --- INICIALIZAÇÃO: Monta a interface dinâmica ao carregar a página ---
        window.onload = () => {
            // Monta os Checkboxes da Liberação
            document.getElementById('modulosLibContainer').innerHTML = listaLib.map(m => `
                <label class="flex items-center p-3 rounded-lg border border-transparent hover:border-blue-200 hover:bg-blue-50 cursor-pointer transition-all">
                    <input type="checkbox" name="mLib" value="${m}" class="h-5 w-5 text-blue-600 rounded">
                    <span class="ml-3 text-sm font-medium text-gray-700">${m}</span>
                </label>`).join('');

            // Monta o Grid do Checklist com grupos e sub-itens (status)
            // Tamanho do texto módulo: text-[14px / tamanho do texto status: text-sm
            document.getElementById('checklistGrid').innerHTML = listaCheck.map(m => `
                <div class="module-group p-4 rounded-xl">
                    <h3 class="text-blue-700 font-extrabold text-[14px] mb-2 uppercase tracking-wider">${m.name}</h3>
                    ${m.status.map(s => `
                        <div class="flex justify-between items-center mb-1 text-sm">
                            <label class="text-gray-600">${s}</label>
                            <input type="number" data-mod="${m.name}" data-stat="${s}" value="0" min="0" class="w-12 border rounded text-center">
                        </div>`).join('')}
                </div>`).join('');
            renderLinks(); 
        };
    </script>
    <!-- FIM SCRIPT -->
</body>
